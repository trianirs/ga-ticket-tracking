<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking Tiket Helpdesk MHDC Group</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #fafafa;
  padding: 16px;
  min-height: 100vh;
}

.container {
  max-width: 600px;
  margin: 0 auto;
}

/* ===================== LOGIN SCREEN ===================== */
.login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 85vh;
}

.login-card {
  background: #ffffff;
  border-radius: 12px;
  border: 0.5px solid #e8e8e8;
  padding: 32px 24px;
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.login-logo {
  height: 52px;
  width: auto;
  object-fit: contain;
  margin-bottom: 16px;
}

.login-title {
  font-size: 18px;
  font-weight: 600;
  color: #212121;
  margin-bottom: 4px;
}

.login-subtitle {
  font-size: 12px;
  color: #888;
  margin-bottom: 24px;
}

.login-divider {
  height: 0.5px;
  background: #e8e8e8;
  margin: 20px 0;
}

.form-label {
  font-size: 12px;
  font-weight: 500;
  color: #444;
  text-align: left;
  display: block;
  margin-bottom: 6px;
}

.form-select, .form-input {
  width: 100%;
  font-size: 14px;
  padding: 11px 12px;
  border: 1px solid #d9d9d9;
  border-radius: 8px;
  background: #ffffff;
  color: #212121;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.2s;
}

.form-select:focus, .form-input:focus {
  border-color: #AE9862;
}

.pin-wrapper {
  position: relative;
}

.pin-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  color: #888;
  padding: 0;
  margin-bottom: 0;
}

.login-btn {
  width: 100%;
  padding: 12px;
  background: #AE9862;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 4px;
}

.login-btn:hover { background: #8e7a4e; }

.login-error {
  font-size: 12px;
  color: #c0392b;
  background: #fdecea;
  border-radius: 6px;
  padding: 8px 12px;
  margin-top: 10px;
  display: none;
}

/* ===================== MAIN APP ===================== */
.main-app { display: none; }

.header-card {
  background: #ffffff;
  border-radius: 8px;
  border: 0.5px solid #e8e8e8;
  padding: 20px;
  margin-bottom: 16px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-logo {
  height: 44px;
  width: auto;
  object-fit: contain;
}

.title-text h1 {
  font-size: 18px;
  font-weight: 500;
  color: #212121;
  margin: 0;
}

.title-text p {
  font-size: 11px;
  color: #666;
  margin: 0;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.klinik-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  background: #f5edd8;
  color: #AE9862;
  border-radius: 20px;
  white-space: nowrap;
}

.logout-btn {
  padding: 6px 12px;
  background: transparent;
  color: #888;
  border: 0.5px solid #d9d9d9;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
}

.logout-btn:hover { background: #f5f5f5; }

.refresh-btn {
  padding: 8px 14px;
  background: #AE9862;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
}

.refresh-btn:hover { background: #8e7a4e; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.stat-card {
  background: #f5f5f5;
  border-radius: 6px;
  padding: 10px;
  text-align: center;
}

.stat-number { font-size: 20px; font-weight: 500; color: #212121; }
.stat-number.gold { color: #AE9862; }
.stat-number.green { color: #1D9E75; }
.stat-label { font-size: 10px; color: #666; margin-top: 2px; }

.search-row {
  display: flex;
  gap: 8px;
}

.search-row input {
  flex: 1;
  font-size: 13px;
  padding: 10px 12px;
  border: 0.5px solid #d9d9d9;
  border-radius: 6px;
  background: #ffffff;
  color: #212121;
  outline: none;
}

.search-row input:focus { border-color: #AE9862; }

.search-row button {
  font-size: 13px;
  padding: 10px 16px;
  background: #AE9862;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 500;
}

.search-row button:hover { background: #8e7a4e; }

/* ===================== TICKET CARDS ===================== */
.card {
  background: #ffffff;
  border: 0.5px solid #e8e8e8;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}

.ticket-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
  gap: 12px;
}

.ticket-id { font-size: 11px; color: #666; }

.ticket-title {
  font-size: 15px;
  font-weight: 500;
  color: #212121;
  margin-top: 2px;
}

.kategori-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  background: #f5f5f5;
  color: #666;
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.ticket-meta { font-size: 12px; color: #666; margin-top: 4px; }

.status-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

.divider { height: 0.5px; background: #e8e8e8; margin: 12px 0; }

.timeline { position: relative; padding-left: 28px; }

.tl-item { position: relative; padding-bottom: 20px; }
.tl-item:last-child { padding-bottom: 0; }

.tl-dot {
  position: absolute;
  left: -28px;
  top: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 500;
  z-index: 1;
}

.tl-line {
  position: absolute;
  left: -20px;
  top: 20px;
  width: 2px;
  height: calc(100% - 2px);
  background: #e8e8e8;
}

.tl-item:last-child .tl-line { display: none; }

.tl-label { font-size: 13px; font-weight: 500; color: #212121; line-height: 1.3; }
.tl-sub { font-size: 11px; color: #666; margin-top: 3px; }
.tl-time { font-size: 11px; color: #666; margin-top: 2px; }

.tl-done .tl-dot { background: #AE9862; color: #fff; }
.tl-done .tl-label { color: #212121; }

.tl-active .tl-dot { background: #AE9862; color: #fff; box-shadow: 0 0 0 4px #e8dfc8; }
.tl-active .tl-label { color: #AE9862; font-weight: 500; }

.tl-wait .tl-dot { background: #f5f5f5; border: 1.5px solid #d9d9d9; color: #999; }
.tl-wait .tl-label { color: #999; }
.tl-wait .tl-line { opacity: 0.4; }

.note-box {
  background: #f5f5f5;
  border-radius: 6px;
  padding: 10px 12px;
  margin-top: 12px;
}

.note-label { font-size: 11px; color: #666; margin-bottom: 3px; }
.note-text { font-size: 13px; color: #212121; }

.empty { text-align: center; padding: 32px 16px; color: #666; font-size: 13px; }
.loading { text-align: center; padding: 32px 16px; color: #666; font-size: 13px; }
.error { background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 12px; margin-bottom: 16px; font-size: 13px; color: #856404; }
.result-count { font-size: 12px; color: #666; margin-bottom: 12px; text-align: center; }
</style>
</head>
<body>

<!-- ===================== LOGIN SCREEN ===================== -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <img src="logo.png" alt="MHDC" class="login-logo">
    <div class="login-title">Tracking Tiket Helpdesk</div>
    <div class="login-subtitle">MHDC Group</div>
    <div class="login-divider"></div>

    <label class="form-label">Pilih Klinik</label>
    <select class="form-select" id="klinikSelect">
      <option value="">-- Pilih Klinik --</option>
      <!-- Klinik akan otomatis terisi dari KLINIK_CONFIG -->
    </select>

    <label class="form-label">Masukkan PIN</label>
    <div class="pin-wrapper">
      <input class="form-input" type="password" id="pinInput" placeholder="Masukkan PIN klinik kamu" style="padding-right: 40px;" />
      <button class="pin-toggle" onclick="togglePin()" id="pinToggle">👁️</button>
    </div>

    <button class="login-btn" onclick="doLogin()">Masuk</button>
    <div class="login-error" id="loginError">PIN salah atau klinik tidak sesuai. Coba lagi.</div>
  </div>
</div>

<!-- ===================== MAIN APP ===================== -->
<div class="container main-app" id="mainApp">
  <div class="header-card">
    <div class="header-top">
      <div class="header-title">
        <img src="logo.png" alt="MHDC" class="header-logo">
        <div class="title-text">
          <h1>Tracking Tiket Helpdesk MHDC Group</h1>
          <p>Pilih klinik dan masukan nomor tiket</p>
        </div>
      </div>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
      <div class="klinik-badge" id="activeBadge">-</div>
      <div class="header-right">
        <button class="logout-btn" onclick="doLogout()">Ganti Klinik</button>
        <button class="refresh-btn" onclick="loadData()">Refresh</button>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="totalStat">-</div>
        <div class="stat-label">Total Tiket</div>
      </div>
      <div class="stat-card">
        <div class="stat-number gold" id="progressStat">-</div>
        <div class="stat-label">On Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-number green" id="doneStat">-</div>
        <div class="stat-label">Selesai</div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="Cari No. Tiket atau kategori..." />
      <button onclick="applyFilters()">Cari</button>
    </div>
  </div>

  <div id="errorMsg"></div>
  <div class="result-count" id="resultCount"></div>
  <div id="result">
    <div class="loading">⏳ Loading data...</div>
  </div>
</div>

<script>
// ================================================================
// ⚙️ KONFIGURASI — EDIT BAGIAN INI UNTUK TAMBAH/UBAH KLINIK & PIN
// ================================================================
const KLINIK_CONFIG = [
  // FORMAT: { nama: 'Nama Klinik Sesuai Google Sheets', pin: 'PIN' }
  // Contoh:
  { nama: 'Klinik Medikids Sunter',      pin: '1234' },
  { nama: 'Klinik Medikids Kemang',      pin: '5678' },
  { nama: 'Klinik Medikids Lebak Bulus', pin: '9012' },
  // Tambahkan klinik baru di bawah sini dengan format yang sama:
  // { nama: 'Nama Klinik Baru', pin: 'PINnya' },
];

// PIN untuk GA/Admin (bisa lihat SEMUA klinik)
const ADMIN_CONFIG = {
  nama: 'GA / Admin',
  pin: 'admin123', // ← GANTI PIN ADMIN DI SINI
};
// ================================================================
// SELESAI KONFIGURASI — jangan ubah kode di bawah ini
// ================================================================

const SHEETS_CONFIG = {
  tickets:  'https://docs.google.com/spreadsheets/d/1Na7BYDCQs3peAT3J3KxoCz6f7p7Gh-0m0naaEwnMQcs/export?format=csv&gid=0',
  timeline: 'https://docs.google.com/spreadsheets/d/1Na7BYDCQs3peAT3J3KxoCz6f7p7Gh-0m0naaEwnMQcs/export?format=csv&gid=1293161438'
};

const STATUS_STYLE = {
  'On Progress':    { bg: '#B5D4F4', color: '#0C447C' },
  'Closed / Done':  { bg: '#d4f0e6', color: '#1D9E75' },
  'Open':           { bg: '#FAC775', color: '#633806' },
  'Diverifikasi GA':{ bg: '#CECBF6', color: '#26215C' },
  'Hold':           { bg: '#D3D1C7', color: '#2C2C2A' },
  'Cancelled':      { bg: '#F7C1C1', color: '#501313' },
};

let allTickets = [];
let allTimelines = [];
let activeKlinik = null;
let isAdmin = false;

// ---- Isi dropdown klinik saat halaman load ----
function initLoginForm() {
  const sel = document.getElementById('klinikSelect');
  KLINIK_CONFIG.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k.nama;
    opt.textContent = k.nama;
    sel.appendChild(opt);
  });
  // Tambah opsi Admin
  const adminOpt = document.createElement('option');
  adminOpt.value = '__admin__';
  adminOpt.textContent = '👤 GA / Admin';
  sel.appendChild(adminOpt);
}

// ---- Toggle show/hide PIN ----
function togglePin() {
  const input = document.getElementById('pinInput');
  const btn = document.getElementById('pinToggle');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
}

// ---- Login ----
function doLogin() {
  const selectedKlinik = document.getElementById('klinikSelect').value;
  const enteredPin = document.getElementById('pinInput').value.trim();
  const errorDiv = document.getElementById('loginError');

  errorDiv.style.display = 'none';

  if (!selectedKlinik) {
    errorDiv.textContent = 'Pilih klinik terlebih dahulu.';
    errorDiv.style.display = 'block';
    return;
  }

  if (!enteredPin) {
    errorDiv.textContent = 'Masukkan PIN terlebih dahulu.';
    errorDiv.style.display = 'block';
    return;
  }

  // Cek admin
  if (selectedKlinik === '__admin__') {
    if (enteredPin === ADMIN_CONFIG.pin) {
      isAdmin = true;
      activeKlinik = null;
      showApp('GA / Admin — Semua Klinik');
      return;
    } else {
      errorDiv.textContent = 'PIN Admin salah. Coba lagi.';
      errorDiv.style.display = 'block';
      return;
    }
  }

  // Cek klinik
  const klinik = KLINIK_CONFIG.find(k => k.nama === selectedKlinik);
  if (klinik && enteredPin === klinik.pin) {
    isAdmin = false;
    activeKlinik = klinik.nama;
    showApp(klinik.nama);
  } else {
    errorDiv.textContent = 'PIN salah. Coba lagi.';
    errorDiv.style.display = 'block';
    document.getElementById('pinInput').value = '';
  }
}

function showApp(badgeLabel) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('activeBadge').textContent = badgeLabel;
  loadData();
}

function doLogout() {
  allTickets = [];
  allTimelines = [];
  activeKlinik = null;
  isAdmin = false;
  document.getElementById('pinInput').value = '';
  document.getElementById('klinikSelect').value = '';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('result').innerHTML = '<div class="loading">⏳ Loading data...</div>';
}

// ---- Enter key on PIN input ----
document.addEventListener('DOMContentLoaded', () => {
  initLoginForm();
  document.getElementById('pinInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilters();
  });
});

// ---- CSV Parser ----
function parseCSV(csvText) {
  const lines = csvText.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
    const row = {};
    headers.forEach((header, index) => { row[header] = values[index] || ''; });
    data.push(row);
  }
  return data;
}

// ---- Load Data ----
async function loadData() {
  document.getElementById('errorMsg').innerHTML = '';
  document.getElementById('result').innerHTML = '<div class="loading">⏳ Loading data...</div>';

  try {
    const [ticketsRes, timelineRes] = await Promise.all([
      fetch(SHEETS_CONFIG.tickets),
      fetch(SHEETS_CONFIG.timeline)
    ]);
    allTickets  = parseCSV(await ticketsRes.text());
    allTimelines = parseCSV(await timelineRes.text());
    updateStats();
    applyFilters();
  } catch (error) {
    document.getElementById('errorMsg').innerHTML = `
      <div class="error"><strong>❌ Error loading data:</strong><br>${error.message}</div>`;
    document.getElementById('result').innerHTML = '';
  }
}

// ---- Stats ----
function updateStats() {
  const tickets = isAdmin ? allTickets : allTickets.filter(t => t.klinik === activeKlinik);
  document.getElementById('totalStat').textContent    = tickets.length;
  document.getElementById('progressStat').textContent = tickets.filter(t => ['On Progress','Open','Diverifikasi GA'].includes(t.status)).length;
  document.getElementById('doneStat').textContent     = tickets.filter(t => t.status === 'Closed / Done').length;
}

// ---- Render Ticket ----
function renderTicket(ticket) {
  const st = STATUS_STYLE[ticket.status] || { bg: '#D3D1C7', color: '#444' };

  const steps = allTimelines
    .filter(t => t.ticket_id === ticket.ticket_id)
    .sort((a, b) => parseInt(a.step_order) - parseInt(b.step_order))
    .map((s, i) => {
      const isDone   = s.is_done === 'TRUE';
      const isActive = s.is_active === 'TRUE';
      const cls  = isDone && !isActive ? 'tl-done' : isActive ? 'tl-active' : 'tl-wait';
      const icon = isDone && !isActive ? '&#10003;' : isActive ? (i + 1) : (i + 1);
      return `
        <div class="tl-item ${cls}">
          <div class="tl-dot">${icon}</div>
          <div class="tl-line"></div>
          <div class="tl-label">${s.label}</div>
          ${s.sub_label ? `<div class="tl-sub">${s.sub_label}</div>` : ''}
          ${s.waktu     ? `<div class="tl-time">${s.waktu}</div>`    : ''}
        </div>`;
    }).join('');

  const metaLine = isAdmin
    ? `${ticket.klinik} &nbsp;·&nbsp; PIC: ${ticket.pic}`
    : `PIC: ${ticket.pic}`;

  return `
    <div class="card">
      <div class="ticket-header">
        <div>
          <div class="ticket-id">${ticket.ticket_id} &nbsp;·&nbsp; ${ticket.tanggal}</div>
          <div class="ticket-title">${ticket.sub_kategori}</div>
          <div class="kategori-badge">${ticket.kategori}</div>
          <div class="ticket-meta">${metaLine}</div>
        </div>
        <div class="status-badge" style="background:${st.bg};color:${st.color}">${ticket.status}</div>
      </div>
      <div class="divider"></div>
      <div class="timeline">${steps}</div>
      ${ticket.catatan ? `
        <div class="note-box">
          <div class="note-label">Catatan dari GA</div>
          <div class="note-text">${ticket.catatan}</div>
        </div>` : ''}
    </div>`;
}

// ---- Apply Filters ----
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = isAdmin ? allTickets : allTickets.filter(t => t.klinik === activeKlinik);

  if (q) {
    filtered = filtered.filter(t =>
      t.ticket_id.toLowerCase().includes(q) ||
      t.klinik.toLowerCase().includes(q) ||
      t.pengaju.toLowerCase().includes(q) ||
      t.kategori.toLowerCase().includes(q) ||
      t.sub_kategori.toLowerCase().includes(q)
    );
  }

  const total = isAdmin ? allTickets.length : allTickets.filter(t => t.klinik === activeKlinik).length;
  document.getElementById('resultCount').textContent = `Menampilkan ${filtered.length} dari ${total} tiket`;
  document.getElementById('result').innerHTML = filtered.length === 0
    ? '<div class="empty">Tiket tidak ditemukan.<br>Coba ubah kata kunci pencarian.</div>'
    : filtered.map(renderTicket).join('');
}
</script>
</body>
</html>
