<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking Tiket Helpdesk MHDC Group</title>

<style>
:root {
  --color-bg: #fafafa;
  --color-card: #ffffff;
  --color-border: #e8e8e8;
  --color-text: #212121;
  --color-sub: #666;
  --gold: #AE9862;
}

body {
  font-family: sans-serif;
  background: var(--color-bg);
  padding: 16px;
}

.container {
  max-width: 600px;
  margin: auto;
}

/* HEADER */
.header-card {
  background: white;
  border-radius: 10px;
  padding: 20px;
  border: 1px solid var(--color-border);
  margin-bottom: 16px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-title {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-img {
  height: 48px;
}

.title-text h1 {
  font-size: 18px;
  margin: 0;
}

.title-text p {
  font-size: 12px;
  color: var(--color-sub);
}

.refresh-btn {
  background: var(--gold);
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

/* STATS */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
  margin: 16px 0;
}

.stat-card {
  background: #f5f5f5;
  padding: 10px;
  text-align: center;
  border-radius: 6px;
}

.stat-number {
  font-size: 20px;
  font-weight: bold;
}

/* FILTER */
.filter-row, .search-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

select, input {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

button {
  background: var(--gold);
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 6px;
}

/* CARD */
.card {
  background: white;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--color-border);
}

.ticket-title {
  font-weight: bold;
  margin: 4px 0;
}

.ticket-meta {
  font-size: 12px;
  color: var(--color-sub);
}

.status {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  display: inline-block;
  margin-top: 6px;
}

/* STATE */
.loading, .empty {
  text-align: center;
  padding: 30px;
  color: #666;
}
</style>
</head>

<body>
<div class="container">

<div class="header-card">
  <div class="header-top">
    <div class="header-title">
      <img src="logo.png" class="logo-img">
      <div class="title-text">
        <h1>Tracking Tiket Helpdesk</h1>
        <p>Real-time Google Sheets</p>
      </div>
    </div>
    <button onclick="loadData()">Refresh</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div id="totalStat" class="stat-number">-</div>
      <div>Total</div>
    </div>
    <div class="stat-card">
      <div id="progressStat" class="stat-number">-</div>
      <div>Progress</div>
    </div>
    <div class="stat-card">
      <div id="doneStat" class="stat-number">-</div>
      <div>Done</div>
    </div>
  </div>

  <div class="filter-row">
    <select id="klinikFilter"></select>
  </div>

  <div class="search-row">
    <input id="searchInput" placeholder="Cari tiket...">
    <button onclick="applyFilters()">Cari</button>
  </div>
</div>

<div id="result"></div>

</div>

<script>
const SHEETS = {
  tickets: 'https://docs.google.com/spreadsheets/d/1Na7BYDCQs3peAT3J3KxoCz6f7p7Gh-0m0naaEwnMQcs/export?format=csv&gid=0'
};

let data = [];

/* FIX CSV PARSER */
function parseCSV(text){
  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows[0];

  return rows.slice(1).map(r=>{
    let obj = {};
    headers.forEach((h,i)=>{
      obj[h.trim()] = (r[i] || "").trim();
    });
    return obj;
  });
}

/* NORMALIZE */
function norm(s){
  return (s || "").toLowerCase().trim();
}

/* LOAD */
async function loadData(){
  document.getElementById("result").innerHTML = '<div class="loading">Loading...</div>';

  const res = await fetch(SHEETS.tickets);
  const txt = await res.text();
  data = parseCSV(txt);

  initFilter();
  updateStats();
  applyFilters();
}

/* FILTER KLINIK */
function initFilter(){
  const kliniks = [...new Set(data.map(d=>d.klinik).filter(Boolean))];

  const select = document.getElementById("klinikFilter");
  select.innerHTML = '<option value="">Semua Klinik</option>';

  kliniks.forEach(k=>{
    let o = document.createElement("option");
    o.value = k;
    o.textContent = k;
    select.appendChild(o);
  });
}

/* STATS FIX */
function updateStats(){
  let total = data.length;

  let progress = data.filter(d=>{
    let s = norm(d.status);
    return s.includes("progress") || s.includes("open");
  }).length;

  let done = data.filter(d=>{
    return norm(d.status).includes("done");
  }).length;

  document.getElementById("totalStat").innerText = total;
  document.getElementById("progressStat").innerText = progress;
  document.getElementById("doneStat").innerText = done;
}

/* FILTER + SEARCH */
function applyFilters(){
  let keyword = norm(document.getElementById("searchInput").value);
  let klinik = document.getElementById("klinikFilter").value;

  let filtered = data;

  if(klinik){
    filtered = filtered.filter(d=>d.klinik === klinik);
  }

  if(keyword){
    filtered = filtered.filter(d=>
      norm(d.ticket_id).includes(keyword) ||
      norm(d.klinik).includes(keyword) ||
      norm(d.kategori).includes(keyword)
    );
  }

  render(filtered);
}

/* RENDER */
function render(list){
  if(list.length === 0){
    document.getElementById("result").innerHTML = '<div class="empty">Tidak ada data</div>';
    return;
  }

  document.getElementById("result").innerHTML =
    list.map(d=>`
      <div class="card">
        <div class="ticket-title">${d.sub_kategori || '-'}</div>
        <div class="ticket-meta">${d.ticket_id} · ${d.klinik}</div>
        <div class="status">${d.status}</div>
      </div>
    `).join('');
}

window.onload = loadData;
</script>

</body>
</html>
